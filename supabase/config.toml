# Supabase project config — managed via CLI

[auth]
site_url = "https://crm-electrico.vercel.app"
additional_redirect_urls = ["https://crm-electrico.vercel.app/**"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[auth.email.template.invite]
subject = "Has sido invitado a OPTIENERGIA CRM"
content_path = "./supabase/templates/invite.html"

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

